[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://maps.googleapis.com https://maps.gstatic.com https://*.googleapis.com https://cdn.jsdelivr.net https://*.supabase.co; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com"
