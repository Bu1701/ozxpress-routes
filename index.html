<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oz-xpress × FOXinGREEN — Route Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f0d;
      --surface: #161713;
      --border: #252620;
      --green: #b8f04a;
      --green-dim: #8ab535;
      --text: #e8e9e2;
      --muted: #6b6d62;
      --tier1: #b8f04a;
      --tier2: #4ab8f0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #sidebar h1 {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    #sidebar h1 span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 6px;
      outline: none;
      width: 100%;
      appearance: none;
    }

    select:focus { border-color: var(--green); }

    input[type="email"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 6px;
      outline: none;
      width: 100%;
    }

    input[type="email"]:focus { border-color: var(--green); }
    input[type="email"]::placeholder { color: var(--muted); }

    #email-btn {
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 8px;
      padding: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.15s;
      display: none;
    }

    #email-btn:hover { background: var(--green); color: var(--bg); }

    #copy-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
      display: none;
    }
    #copy-btn:hover { border-color: var(--muted); color: var(--text); }
    #copy-btn.copied { border-color: var(--green); color: var(--green); }

    #admin-link {
      display: block;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 0;
      letter-spacing: 0.04em;
    }
    #admin-link:hover { color: var(--green); }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--green);
      cursor: pointer;
    }

    #stops-val {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--green);
      min-width: 18px;
      text-align: right;
    }

    #generate-btn {
      margin-top: auto;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }

    #generate-btn:hover { background: #ceff5e; }
    #generate-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ── MAIN ── */
    #main {
      flex: 1;
      padding: 32px 36px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #main-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    #main-header h2 {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text);
    }

    #route-meta {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      flex: 1;
    }

    /* ── VIEW TABS ── */
    .view-tabs {
      display: none;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .view-tabs.visible { display: flex; }

    .tab-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--green);
      color: var(--bg);
      font-weight: 500;
    }

    #cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #map-view {
      display: none;
      flex: 1;
      min-height: 600px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #map-view.visible { display: block; }

    /* empty / error states */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }

    #empty-state.error { color: #f04a4a; }

    /* loading */
    #loading {
      display: none;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--green);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* stop card */
    .stop-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 0 16px;
      align-items: start;
    }

    .stop-num {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--muted);
      line-height: 1;
      padding-top: 2px;
    }

    .stop-body { display: flex; flex-direction: column; gap: 5px; }

    .stop-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .stop-address {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .stop-bio {
      font-size: 13px;
      color: #a0a196;
      line-height: 1.55;
      margin-top: 4px;
    }

    .stop-pitch {
      font-size: 13px;
      font-style: italic;
      color: var(--green-dim);
      margin-top: 2px;
    }

    .stop-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      min-width: 80px;
    }

    .stop-time {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
    }

    .tier-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tier-1 {
      background: rgba(184, 240, 74, 0.12);
      color: var(--tier1);
      border: 1px solid rgba(184, 240, 74, 0.25);
    }

    .tier-2 {
      background: rgba(74, 184, 240, 0.12);
      color: var(--tier2);
      border: 1px solid rgba(74, 184, 240, 0.25);
    }

    .stop-type {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── auth gate overlay ── */
    #auth-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 13px; color: var(--green);
      gap: 10px;
    }

    /* ── identity block in sidebar ── */
    #identity {
      border-top: 1px solid var(--border);
      padding-top: 14px; margin-top: 4px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    #identity .who { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    #identity .who .name {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #identity .who .role {
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    #logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 6px 10px; font-family: 'DM Mono', monospace;
      font-size: 11px; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    #logout-btn:hover { border-color: var(--red, #f04a4a); color: var(--red, #f04a4a); }
  </style>
</head>
<body>

<!-- ── AUTH GATE OVERLAY (removed once login is verified) ── -->
<div id="auth-gate"><div class="spinner"></div> Checking login…</div>

<!-- ── SIDEBAR ── -->
<aside id="sidebar">
  <h1>oz-xpress<br/>× FOXinGREEN<span>Manhattan B2B Route Builder</span></h1>

  <div class="field">
    <label for="neighborhood">Neighborhood</label>
    <select id="neighborhood">
      <option value="SoHo/NoLita">SoHo / NoLita</option>
      <option value="Lower East Side/Canal St">Lower East Side / Canal St</option>
      <option value="Chelsea">Chelsea</option>
      <option value="Flatiron/Union Square">Flatiron / Union Square</option>
      <option value="Upper East Side">Upper East Side</option>
      <option value="Upper West Side">Upper West Side</option>
      <option value="Midtown">Midtown</option>
      <option value="Harlem">Harlem</option>
      <option value="Washington Heights">Washington Heights</option>
      <option value="TriBeCa/Financial District">TriBeCa / Financial District</option>
      <option value="East Village/Alphabet City">East Village / Alphabet City</option>
      <option value="West Village/Greenwich Village">West Village / Greenwich Village</option>
    </select>
  </div>

  <div class="field">
    <label for="sales-rep">Sales Rep</label>
    <select id="sales-rep"></select>
  </div>

  <div class="field">
    <label for="start-time">Start Time</label>
    <select id="start-time">
      <option value="9:00 AM">9:00 AM</option>
      <option value="10:00 AM">10:00 AM</option>
      <option value="11:00 AM">11:00 AM</option>
      <option value="2:00 PM">2:00 PM</option>
      <option value="3:00 PM">3:00 PM</option>
    </select>
  </div>

  <div class="field">
    <label for="stops">Stops: <span id="stops-val">7</span></label>
    <div class="slider-wrap">
      <input type="range" id="stops" min="5" max="10" value="7" />
    </div>
  </div>

  <div class="field">
    <label for="rep-email">Rep Email</label>
    <input type="email" id="rep-email" placeholder="rep@ozxpress.com" autocomplete="off" />
  </div>

  <button id="generate-btn">Generate Route</button>
  <button id="email-btn" onclick="emailRoute()">&#9993; Email Route to Rep</button>
  <button id="copy-btn" onclick="copyRoute()">&#9112; Copy Route</button>
  <a id="admin-link" href="admin.html" style="display:none">&#9881; Back Office</a>

  <div id="identity">
    <div class="who">
      <span class="name" id="id-name">—</span>
      <span class="role" id="id-role"></span>
    </div>
    <button id="logout-btn" onclick="ozAuth.signOut()">Log out</button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main id="main">
  <div id="main-header">
    <h2>Route</h2>
    <span id="route-meta"></span>
    <div class="view-tabs" id="view-tabs">
      <button class="tab-btn active" id="tab-list" onclick="switchTab('list')">List</button>
      <button class="tab-btn" id="tab-map" onclick="switchTab('map')">Map</button>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div> Building route…</div>

  <div id="cards">
    <div id="empty-state">Configure the route on the left<br/>then hit Generate.</div>
  </div>

  <div id="map-view"></div>
</main>

<script>
  const GMAPS_KEY = 'AIzaSyAKn-FmKki_ULQ43mRE2t5FU_UOVqy9T_k';
  let mapInstance = null;
  let geocoder = null;
  let currentStops = [];
  let currentNeighborhood = '', currentRep = '', currentStartTime = '';

  // ── load Google Maps script once
  function loadMapsScript() {
    if (document.getElementById('gmaps-script')) return;
    const s = document.createElement('script');
    s.id = 'gmaps-script';
    s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&callback=onMapsReady`;
    s.async = true;
    document.head.appendChild(s);
  }

  window.onMapsReady = function() {
    geocoder = new google.maps.Geocoder();
  };

  // ── dark map style
  const darkStyle = [
    { elementType: 'geometry', stylers: [{ color: '#161713' }] },
    { elementType: 'labels.text.stroke', stylers: [{ color: '#0e0f0d' }] },
    { elementType: 'labels.text.fill', stylers: [{ color: '#6b6d62' }] },
    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#252620' }] },
    { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#0e0f0d' }] },
    { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#9ca5b3' }] },
    { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#2c2e28' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0a0b09' }] },
    { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#3d3d3d' }] },
    { featureType: 'poi', stylers: [{ visibility: 'off' }] },
    { featureType: 'transit', stylers: [{ visibility: 'off' }] },
  ];

  // ── tab switching
  function switchTab(tab) {
    document.getElementById('tab-list').classList.toggle('active', tab === 'list');
    document.getElementById('tab-map').classList.toggle('active', tab === 'map');
    document.getElementById('cards').style.display = tab === 'list' ? 'flex' : 'none';
    const mapView = document.getElementById('map-view');
    if (tab === 'map') {
      mapView.classList.add('visible');
      buildMap();
    } else {
      mapView.classList.remove('visible');
    }
  }

  // ── add a numbered circle marker
  function addNumberedMarker(pos, num, stop) {
    const marker = new google.maps.Marker({
      position: pos,
      map: mapInstance,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 14,
        fillColor: '#b8f04a',
        fillOpacity: 1,
        strokeColor: '#0e0f0d',
        strokeWeight: 1.5,
      },
      label: {
        text: String(num),
        color: '#0e0f0d',
        fontSize: '11px',
        fontWeight: 'bold',
        fontFamily: 'DM Mono, monospace',
      },
      title: `${num}. ${stop.name}`,
      zIndex: 10,
    });
    const iw = new google.maps.InfoWindow({
      content: `<div style="font-family:DM Sans,sans-serif;font-size:13px;color:#0e0f0d;max-width:200px;">
        <strong>${stop.name}</strong><br/>
        <span style="font-size:11px;color:#555;">${stop.address}</span><br/>
        <em style="font-size:12px;color:#5a8a1a;">${stop.pitch}</em>
      </div>`
    });
    marker.addListener('click', () => iw.open(mapInstance, marker));
    window._mapMarkers.push(marker);
  }

  // ── build/refresh map with walking directions + optimized stop order
  function buildMap() {
    if (!window.google || currentStops.length === 0) return;
    const mapDiv = document.getElementById('map-view');

    if (!mapInstance) {
      mapInstance = new google.maps.Map(mapDiv, {
        zoom: 14,
        center: { lat: 40.7589, lng: -73.9851 },
        styles: darkStyle,
        disableDefaultUI: false,
        zoomControl: true,
        streetViewControl: false,
        mapTypeControl: false,
        fullscreenControl: true,
      });
    }

    // clear previous markers and route
    if (window._mapMarkers) window._mapMarkers.forEach(m => m.setMap(null));
    window._mapMarkers = [];
    if (window._dirRenderer) { window._dirRenderer.setMap(null); window._dirRenderer = null; }

    // single stop fallback
    if (currentStops.length < 2) {
      geocoder.geocode({ address: currentStops[0].address + ', New York, NY' }, (res, status) => {
        if (status === 'OK') {
          const pos = res[0].geometry.location;
          addNumberedMarker(pos, 1, currentStops[0]);
          mapInstance.setCenter(pos);
          mapInstance.setZoom(15);
        }
      });
      return;
    }

    const svc = new google.maps.DirectionsService();
    const renderer = new google.maps.DirectionsRenderer({
      map: mapInstance,
      suppressMarkers: true,
      polylineOptions: { strokeColor: '#b8f04a', strokeOpacity: 0.85, strokeWeight: 3 }
    });
    window._dirRenderer = renderer;

    const toAddr = a => a + ', New York, NY';
    const waypoints = currentStops.slice(1, -1).map(s => ({ location: toAddr(s.address), stopover: true }));

    svc.route({
      origin: toAddr(currentStops[0].address),
      destination: toAddr(currentStops[currentStops.length - 1].address),
      waypoints,
      optimizeWaypoints: true,
      travelMode: google.maps.TravelMode.WALKING,
    }, (result, status) => {
      if (status !== 'OK') {
        console.error('Directions error:', status);
        return;
      }
      renderer.setDirections(result);

      // reorder stops based on Google's optimized waypoint order
      const wpOrder = result.routes[0].waypoint_order;
      const first = currentStops[0];
      const last = currentStops[currentStops.length - 1];
      const middle = currentStops.slice(1, -1);
      currentStops = [first, ...wpOrder.map(i => middle[i]), last];

      // place numbered markers at each stop
      const legs = result.routes[0].legs;
      const bounds = new google.maps.LatLngBounds();
      legs.forEach((leg, i) => {
        bounds.extend(leg.start_location);
        addNumberedMarker(leg.start_location, i + 1, currentStops[i]);
      });
      const lastLeg = legs[legs.length - 1];
      bounds.extend(lastLeg.end_location);
      addNumberedMarker(lastLeg.end_location, currentStops.length, currentStops[currentStops.length - 1]);
      mapInstance.fitBounds(bounds);

      // re-render list cards in the new walking order
      renderCards(currentStops, currentNeighborhood, currentStartTime, currentRep);
    });
  }

  // ── stops slider label
  const stopsSlider = document.getElementById('stops');
  const stopsVal = document.getElementById('stops-val');
  stopsSlider.addEventListener('input', () => { stopsVal.textContent = stopsSlider.value; });

  // ── time arithmetic
  function addMinutes(timeStr, mins) {
    const [time, period] = timeStr.split(' ');
    let [h, m] = time.split(':').map(Number);
    if (period === 'PM' && h !== 12) h += 12;
    if (period === 'AM' && h === 12) h = 0;
    const total = h * 60 + m + mins;
    let nh = Math.floor(total / 60) % 24;
    const nm = total % 60;
    const np = nh >= 12 ? 'PM' : 'AM';
    if (nh > 12) nh -= 12;
    if (nh === 0) nh = 12;
    return `${nh}:${String(nm).padStart(2, '0')} ${np}`;
  }

  function stopTime(startStr, index) {
    let t = startStr;
    for (let i = 0; i < index; i++) t = addMinutes(t, 25);
    return t;
  }

  function extractJson(text) {
    const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fenced) return JSON.parse(fenced[1].trim());
    const arrMatch = text.match(/\[[\s\S]*\]/);
    if (arrMatch) return JSON.parse(arrMatch[0]);
    return JSON.parse(text.trim());
  }

  function renderCards(stops, neighborhood, startTime, rep) {
    const cards = document.getElementById('cards');
    cards.innerHTML = '';
    document.getElementById('route-meta').textContent =
      `${neighborhood} · ${rep} · ${stops.length} stops from ${startTime}`;
    document.getElementById('view-tabs').classList.add('visible');

    stops.forEach((stop, i) => {
      const time = stopTime(startTime, i);
      const tier = Number(stop.tier) || 1;
      const tierLabel = tier === 1 ? 'Tier 1' : 'Tier 2';
      const card = document.createElement('div');
      card.className = 'stop-card';
      card.innerHTML = `
        <div class="stop-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="stop-body">
          <div class="stop-name">${stop.name || 'Unknown'}</div>
          <div class="stop-address">${stop.address || ''}</div>
          <div class="stop-type">${stop.type || ''}</div>
          <div class="stop-bio">${stop.bio || ''}</div>
          <div class="stop-pitch">"${stop.pitch || ''}"</div>
        </div>
        <div class="stop-right">
          <div class="stop-time">${time}</div>
          <span class="tier-badge tier-${tier}">${tierLabel}</span>
        </div>
      `;
      cards.appendChild(card);
    });
  }

  // ── email route via mailto
  function emailRoute() {
    const email = document.getElementById('rep-email').value.trim();
    if (!email) { alert('Please enter the rep\'s email address.'); return; }

    const neighborhood = document.getElementById('neighborhood').value;
    const rep = document.getElementById('sales-rep').value;
    const startTime = document.getElementById('start-time').value;

    const subject = `Your B2B Route — ${neighborhood} (${new Date().toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'})})`;

    let body = `Hi ${rep},\n\nHere is your B2B sales route for today:\n`;
    body += `📍 ${neighborhood}  |  Start: ${startTime}\n`;
    body += `─────────────────────────────────\n\n`;

    currentStops.forEach((stop, i) => {
      const time = stopTime(startTime, i);
      const tier = Number(stop.tier) || 1;
      body += `STOP ${String(i+1).padStart(2,'0')} — ${time}\n`;
      body += `${stop.name}\n`;
      body += `${stop.address}\n`;
      body += `Type: ${stop.type}  |  Tier ${tier}\n`;
      body += `Pitch: "${stop.pitch}"\n\n`;
    });

    body += `─────────────────────────────────\n`;
    body += `Good luck out there!\n\noz-xpress × FOXinGREEN`;

    window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  // ── copy route to clipboard
  function copyRoute() {
    if (currentStops.length === 0) return;

    const neighborhood = currentNeighborhood;
    const rep = currentRep;
    const startTime = currentStartTime;

    let text = `B2B ROUTE — ${neighborhood}\n`;
    text += `Rep: ${rep}  |  Start: ${startTime}\n`;
    text += `${'─'.repeat(36)}\n\n`;

    currentStops.forEach((stop, i) => {
      const time = stopTime(startTime, i);
      const tier = Number(stop.tier) || 1;
      text += `STOP ${String(i+1).padStart(2,'0')} — ${time}\n`;
      text += `${stop.name}\n`;
      text += `${stop.address}\n`;
      text += `Type: ${stop.type}  |  Tier ${tier}\n`;
      text += `Pitch: "${stop.pitch}"\n\n`;
    });

    text += `${'─'.repeat(36)}\n`;
    text += `oz-xpress × FOXinGREEN`;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '⊟ Copy Route';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── identity + rep loading (Supabase auth) ───────────────────────────────
  const repField = document.getElementById('sales-rep').closest('.field');

  function addRepOption(name, email) {
    const select = document.getElementById('sales-rep');
    const o = document.createElement('option');
    o.value = name; o.textContent = name; o.dataset.email = email || '';
    select.appendChild(o);
  }

  async function loadRepsForAdmin() {
    const select = document.getElementById('sales-rep');
    select.innerHTML = '';
    const { data, error } = await ozAuth.client
      .from('reps').select('name,email').eq('active', true).order('name');
    if (error || !data || data.length === 0) {
      addRepOption(window._me.name, window._me.email);   // fall back to self
    } else {
      data.forEach(r => addRepOption(r.name, r.email));
    }
    const first = select.options[0];
    if (first && first.dataset.email) document.getElementById('rep-email').value = first.dataset.email;
  }

  function applyIdentity(me) {
    document.getElementById('id-name').textContent = me.name;
    document.getElementById('id-role').textContent = me.role;

    if (me.role === 'admin') {
      document.getElementById('admin-link').style.display = 'block';
      repField.style.display = '';            // admin chooses which rep
      loadRepsForAdmin();
    } else {
      // salesperson — locked to their own identity
      const select = document.getElementById('sales-rep');
      select.innerHTML = '';
      addRepOption(me.name, me.email);
      select.value = me.name;
      repField.style.display = 'none';        // hide the rep picker
      document.getElementById('rep-email').value = me.email || '';
    }
  }

  // auto-fill rep email when the admin changes the rep selection
  document.getElementById('sales-rep').addEventListener('change', function () {
    const selected = this.options[this.selectedIndex];
    const emailInput = document.getElementById('rep-email');
    if (selected && selected.dataset.email) emailInput.value = selected.dataset.email;
  });

  // ── AUTH GATE: app stays covered until we know who you are ──
  (async function () {
    const me = await ozAuth.requireAuth(null);
    if (!me) return;                          // requireAuth redirected to login
    window._me = me;
    applyIdentity(me);
    const gate = document.getElementById('auth-gate');
    if (gate) gate.remove();
  })();

  // ── generate
  document.getElementById('generate-btn').addEventListener('click', async () => {
    const neighborhood = document.getElementById('neighborhood').value;
    const rep = document.getElementById('sales-rep').value;
    const startTime = document.getElementById('start-time').value;
    const numStops = parseInt(stopsSlider.value);

    const btn = document.getElementById('generate-btn');
    const loading = document.getElementById('loading');
    const cards = document.getElementById('cards');

    // reset map
    mapInstance = null;
    currentStops = [];
    window._mapMarkers = [];
    window._dirRenderer = null;
    document.getElementById('map-view').classList.remove('visible');
    document.getElementById('map-view').innerHTML = '';
    document.getElementById('copy-btn').style.display = 'none';
    document.getElementById('copy-btn').classList.remove('copied');
    switchTab('list');

    btn.disabled = true;
    loading.style.display = 'flex';
    cards.innerHTML = '';

    try {
      const payload = {
        model: 'claude-opus-4-5',
        max_tokens: 2048,
        system: 'You are a NYC B2B sales route planner for oz-xpress same-day van delivery. Return ONLY valid JSON array, no markdown.',
        messages: [{
          role: 'user',
          content: `Generate ${numStops} B2B sales stops in ${neighborhood}, Manhattan. Each stop should be a real-feeling business. Return a JSON array where each object has: name (string), address (string with real-feeling NYC street address in ${neighborhood}), type (string, business category), tier (1 for furniture/appliance/mattress retailers or 2 for thrift/decor/medical suppliers), bio (string, 2 sentences about the business), pitch (string, 1 sentence sales pitch for oz-xpress same-day delivery). Return only the JSON array.`
        }]
      };

      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error?.message || data.error || `HTTP ${res.status}`);

      const text = data.content?.[0]?.text || '';
      const stops = extractJson(text);
      if (!Array.isArray(stops) || stops.length === 0) throw new Error('No stops returned from Claude.');

      currentStops = stops;
      currentNeighborhood = neighborhood;
      currentRep = rep;
      currentStartTime = startTime;
      loading.style.display = 'none';
      renderCards(stops, neighborhood, startTime, rep);
      document.getElementById('email-btn').style.display = 'block';
      document.getElementById('copy-btn').style.display = 'block';
      loadMapsScript();

    } catch (err) {
      loading.style.display = 'none';
      cards.innerHTML = `<div id="empty-state" class="error">Error: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
